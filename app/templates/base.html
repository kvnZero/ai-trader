<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Trader{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dist/styles.css') }}" />
  </head>
  <body class="min-h-screen bg-[linear-gradient(180deg,_rgba(8,12,18,1),_rgba(14,23,33,1)_35%,_rgba(8,12,18,1))] text-slate-100 antialiased">
    <div class="relative min-h-screen overflow-hidden">
      <div class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_top_left,_rgba(34,197,94,0.14),_transparent_28%),radial-gradient(circle_at_85%_20%,_rgba(56,189,248,0.12),_transparent_24%),radial-gradient(circle_at_bottom,_rgba(249,115,22,0.10),_transparent_32%)]"></div>
      <div class="relative mx-auto min-h-screen max-w-[1500px] px-4 py-4 sm:px-6 lg:px-8">
        <div class="grid min-h-[calc(100vh-2rem)] gap-4 lg:grid-cols-[280px_minmax(0,1fr)]">
          <aside class="rounded-[2rem] border border-slate-800/80 bg-slate-950/80 p-5 backdrop-blur-xl">
            <div class="flex items-center gap-3">
              <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-emerald-400/15 text-lg font-semibold text-emerald-200">
                T
              </div>
              <div>
                <p class="text-xs uppercase tracking-[0.24em] text-slate-500">A-Share AI</p>
                <h1 class="text-xl font-semibold text-white">Trader Platform</h1>
              </div>
            </div>

            <div class="mt-6 rounded-3xl border border-slate-800/80 bg-slate-900/70 p-4">
              <p class="text-xs uppercase tracking-[0.22em] text-slate-500">Global Search</p>
              <form action="{{ url_for('core.research') }}" method="get" class="mt-3">
                <label for="query" class="sr-only">Search symbol</label>
                <input
                  id="query"
                  name="query"
                  type="text"
                  placeholder="股票代码 / 名称"
                  class="w-full rounded-2xl border border-slate-800 bg-slate-950/90 px-4 py-3 text-sm text-slate-100 placeholder:text-slate-500 focus:border-emerald-400/50 focus:outline-none"
                />
              </form>
            </div>

            <nav class="mt-6 space-y-2">
              {% for item in navigation | default([]) %}
                {% set active = active_nav == item.endpoint %}
                <a
                  href="{{ url_for(item.endpoint) }}"
                  class="block rounded-3xl border px-4 py-4 transition {% if active %}border-emerald-400/30 bg-emerald-300/10 text-white{% else %}border-slate-800/80 bg-slate-900/55 text-slate-300 hover:border-slate-700 hover:bg-slate-900/85{% endif %}"
                >
                  <div class="flex items-center justify-between gap-4">
                    <span class="text-sm font-medium">{{ item.label }}</span>
                    <span class="text-[11px] uppercase tracking-[0.18em] text-slate-500">{{ item.description }}</span>
                  </div>
                </a>
              {% endfor %}
            </nav>

            <div class="mt-6 rounded-3xl border border-slate-800/80 bg-slate-900/55 p-4 text-sm text-slate-400">
              <p class="text-xs uppercase tracking-[0.22em] text-slate-500">Platform Rules</p>
              <p class="mt-3 leading-6">数据新鲜度、证据链、推荐置信度、模块独立性都会作为一等公民展示。</p>
            </div>
          </aside>

          <div class="min-w-0 rounded-[2rem] border border-slate-800/80 bg-slate-950/55 p-4 shadow-2xl shadow-slate-950/30 backdrop-blur-xl sm:p-6">
            {% block body %}{% endblock %}
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
